name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-windows-powershell:
    name: Test (Windows PowerShell 5.1)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run isolated test suite
        shell: powershell
        run: ./tests/Test-AgentRules.ps1 -SkipInteractive

      - name: Rebuild tracked artifacts
        shell: powershell
        run: ./scripts/Build-AgentRules.ps1 -Target All

      - name: Verify generated artifacts are committed
        shell: powershell
        run: git diff --exit-code -- dist

  test-powershell:
    name: Test (PowerShell 7)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run isolated test suite
        shell: pwsh
        run: ./tests/Test-AgentRules.ps1

      - name: Rebuild tracked artifacts
        shell: pwsh
        run: ./scripts/Build-AgentRules.ps1 -Target All

      - name: Verify generated artifacts are committed
        shell: pwsh
        run: git diff --exit-code -- dist

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout complete history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan repository and Git history
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

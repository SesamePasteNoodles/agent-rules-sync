name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows PowerShell 5.1
            shell: powershell
          - name: PowerShell 7
            shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run isolated test suite
        shell: ${{ matrix.shell }}
        run: ./tests/Test-AgentRules.ps1

      - name: Rebuild tracked artifacts
        shell: ${{ matrix.shell }}
        run: ./scripts/Build-AgentRules.ps1 -Target All

      - name: Verify generated artifacts are committed
        shell: ${{ matrix.shell }}
        run: git diff --exit-code -- dist

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout complete history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan repository and Git history
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
